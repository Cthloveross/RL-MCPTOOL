# ============================================================
# MCPoisoner MVE Configuration
# ============================================================
# Minimum Viable Experiment: validate RL attacker > static baselines
# Target hardware: single A100 40GB
# Expected runtime: ~16-20h training, ~2-4h evaluation

experiment:
  name: "mve"
  seed: 42
  output_dir: "./experiments/mve"
  log_to_wandb: true
  wandb_project: "mcpoisoner-mve"

# ── Models ────────────────────────────────────────────────────
attacker:
  model_name: "Qwen/Qwen2.5-0.5B-Instruct"
  dtype: "bfloat16"
  lora:
    rank: 64
    alpha: 128
    dropout: 0.05
    target_modules:
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
      - "gate_proj"
      - "up_proj"
      - "down_proj"

victim:
  model_name: "Qwen/Qwen2.5-7B-Instruct"
  quantization:
    load_in_4bit: true
    bnb_4bit_compute_dtype: "float16"
    bnb_4bit_quant_type: "nf4"
    bnb_4bit_use_double_quant: true

transfer_victim:
  model_name: "meta-llama/Llama-3.1-8B-Instruct"
  quantization:
    load_in_4bit: true
    bnb_4bit_compute_dtype: "float16"
    bnb_4bit_quant_type: "nf4"
    bnb_4bit_use_double_quant: true

# ── Data ──────────────────────────────────────────────────────
data:
  scenarios_path: "./data/scenarios/mve_scenarios.json"

# ── GRPO Training ─────────────────────────────────────────────
training:
  num_train_epochs: 50           # over 20 scenarios -> ~1000 steps
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 2
  num_generations: 4             # GRPO group size G=4
  max_completion_length: 512
  max_prompt_length: 1024
  learning_rate: 5.0e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  beta: 0.0                     # KL coefficient (DAPO: no KL penalty)
  max_grad_norm: 1.0
  bf16: true
  save_steps: 200
  logging_steps: 10
  log_completions: true
  report_to: "wandb"            # "none" to disable

# ── Reward (MVE: ASR-only) ────────────────────────────────────
reward:
  # Reward values per attack outcome
  hijacking_success: 1.0
  argument_tamper_success: 0.8
  implicit_manipulation_success: 0.5
  failure: 0.0
  # Partial credit for mentioning malicious tool without calling it
  partial_credit: 0.5

# ── Evaluation ────────────────────────────────────────────────
evaluation:
  num_variants: 4                # candidates per baseline per scenario
  victim_max_new_tokens: 256
  temperature: 0.7               # for sampling-based baselines
  top_p: 0.9
  baselines:
    - "random"
    - "template"
    - "llm_singleshot"
    - "mcpoisoner_rl"

# ── Analysis ──────────────────────────────────────────────────
analysis:
  figure_format: "pdf"
  dpi: 300
  plot_style: "seaborn-v0_8-paper"
