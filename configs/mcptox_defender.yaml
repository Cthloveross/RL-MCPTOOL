experiment:
  name: "mcptox_defender"
  seed: 42
  output_dir: "./experiments/mcptox_defender"

agent:
  model_name: "Qwen/Qwen3-8B"
  quantization:
    load_in_4bit: true
    bnb_4bit_compute_dtype: "float16"
    bnb_4bit_quant_type: "nf4"
    bnb_4bit_use_double_quant: true
  lora:
    rank: 16
    alpha: 32
    dropout: 0.05
    target_modules:
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
      - "gate_proj"
      - "up_proj"
      - "down_proj"

data:
  mcptox_path: "/work/tc442/MCPTox-Benchmark/response_all.json"
  sft_data_path: "./data/mcptox_defender/sft_data.json"
  dpo_data_path: "./data/mcptox_defender/dpo_data.json"
  train_paradigms:
    - "Template-1"
    - "Template-2"
  test_paradigm: "Template-3"

sft:
  num_epochs: 3
  learning_rate: 5.0e-6
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  max_seq_length: 2048
  max_grad_norm: 0.3
  warmup_ratio: 0.1
  save_steps: 200
  logging_steps: 10
  gradient_checkpointing: true
  report_to: "none"

dpo:
  num_epochs: 1
  learning_rate: 5.0e-7
  beta: 0.1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  max_length: 2048
  save_steps: 200
  logging_steps: 10
  gradient_checkpointing: true
  report_to: "none"

grpo:
  num_generations: 2
  max_completion_length: 128
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  num_train_epochs: 1
  learning_rate: 5.0e-6
  beta: 0.0
  warmup_ratio: 0.05
  max_grad_norm: 1.0
  save_steps: 100
  logging_steps: 10
  gradient_checkpointing: true
  log_completions: true
  report_to: "none"
  use_vllm: false
  reward:
    correct: 1.0
    hijacked: -1.0
    over_refusal: -0.5
    parse_fail: -0.3
    format_bonus: 0.1
